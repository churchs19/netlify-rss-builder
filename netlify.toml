[build]
  command = "npm run build"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Serve the RSS feed at a friendlier URL
[[redirects]]
  from = "/rss.xml"
  to   = "/.netlify/functions/rss"
  status = 200

[[redirects]]
  from = "/feed"
  to   = "/.netlify/functions/rss"
  status = 200
