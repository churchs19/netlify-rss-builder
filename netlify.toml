[build]
  command = "npm run build"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Route /:source/rss.xml and /:source/feed to the generic rss function.
# The function extracts the slug from the original request URL path.
[[redirects]]
  from = "/:source/rss.xml"
  to   = "/.netlify/functions/rss"
  status = 200

[[redirects]]
  from = "/:source/feed"
  to   = "/.netlify/functions/rss"
  status = 200
