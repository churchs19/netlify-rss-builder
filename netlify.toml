[build]
  command = "npm run build"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Denver Post ────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/denverpost/rss.xml"
  to   = "/.netlify/functions/denverpost-rss"
  status = 200

[[redirects]]
  from = "/denverpost/feed"
  to   = "/.netlify/functions/denverpost-rss"
  status = 200

